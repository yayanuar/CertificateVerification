<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <div class="logo">
        🛡️ CertChain
    </div>

    <ul>
        <li><a href="index.html">Verify</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
    </ul>

    <button class="issue-btn">Issue Certificate</button>
</nav>

<div class="dashboard">

    <h1>User Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h3>Total Certificates</h3>
        </div>

        <div class="card">
            <h3>Verified</h3>
        </div>

        <div class="card">
            <h3>Pending</h3>
        </div>

    </div>

    <div class="table-section">

        <h2>Recent Certificates</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>CERT-2026-0001</td>
                <td>John Doe</td>
                <td>Verified</td>
            </tr>

            
        </table>

    </div>

</div>

</body>
</html>
